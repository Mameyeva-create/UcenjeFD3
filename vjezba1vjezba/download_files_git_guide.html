<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Памятка по Git</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; color: #333; }
        h1 { color: #2c3e50; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .push { border-left: 5px solid #2ecc71; }
        .pull { border-left: 5px solid #3498db; }
        code { background: #eee; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Краткое руководство по Git для новичков</h1>
    <div class="box push">
        <h2>Команда Push</h2>
        <p>Отправляет ваши закоммиченные изменения на удаленный сервер. Команда в терминале: <code>git push origin main</code></p>
    </div>
    <div class="box pull">
        <h2>Команда Pull</h2>
        <p>Забирает актуальный код от коллег с сервера и объединяет со своей локальной версией. Команда в терминале: <code>git pull origin main</code></p>
    </div>
</body>
</html>
